version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7
    container_name: uber_mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    networks:
      - uber_network

  # Backend Service
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: uber_backend
    environment:
      NODE_ENV: production
      PORT: 4000
      DB_CONNECT: mongodb://admin:password123@mongodb:27017/uber_clone?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-your_super_secret_jwt_key_change_this_in_production}
      FRONTEND_URL: http://localhost:3000
      CORS_ORIGIN: http://localhost:3000
    ports:
      - "4000:4000"
    depends_on:
      - mongodb
    restart: unless-stopped
    networks:
      - uber_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: uber_frontend
    environment:
      VITE_API_BASE_URL: http://localhost:4000
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - uber_network

volumes:
  mongodb_data:

networks:
  uber_network:
    driver: bridge
